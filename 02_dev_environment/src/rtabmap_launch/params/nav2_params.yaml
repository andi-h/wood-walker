bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 3.14

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Speeds (keep consistent with velocity_smoother max)
      desired_linear_vel: 0.22
      min_speed_linear: 0.1
      max_speed_linear: 0.26

      # Lookahead (indoor / slow)
      lookahead_dist: 0.60
      min_lookahead_dist: 0.35
      max_lookahead_dist: 1.20
      use_velocity_scaled_lookahead_dist: True
      lookahead_time: 1.5

      use_rotate_to_heading: False # no rotate-in-place
      allow_reversing: True

      # Regulation near obstacles / turns
      use_regulated_linear_velocity_scaling: True
      use_cost_regulated_linear_velocity_scaling: True
      cost_scaling_dist: 0.8
      cost_scaling_gain: 1.0

      # Safety
      max_allowed_time_to_collision_up_to_carrot: 1.0

      transform_tolerance: 0.2

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: truck_origin
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.7, 0.12], [0.7, -0.12], [-0.05, -0.12], [-0.05, 0.12]]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.4
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: -0.10
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 0.9
        mark_threshold: 0
        observation_sources: obstacles clearing
        obstacles:
          topic: /local_grid_obstacle
          data_type: "PointCloud2"
          marking: True
          clearing: True
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          max_obstacle_height: 0.9

        clearing:
          topic: /local_grid_empty
          data_type: "PointCloud2"
          marking: False
          clearing: True
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          max_obstacle_height: 0.9
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: truck_origin
      use_sim_time: False
      footprint: "[[0.7, 0.12], [0.7, -0.12], [-0.05, -0.12], [-0.05, 0.12]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.45
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      # disable spin
      simulate_ahead_time: 0.0
      max_rotational_vel: 0.01
      min_rotational_vel: 0.0
      rotational_acc_lim: 0.1
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: truck_origin
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.01
    min_rotational_vel: 0.0
    rotational_acc_lim: 0.1

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 2

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [1.2, 0.0, 3.2]
    max_decel: [-1.2, 0.0, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.02]
    velocity_timeout: 0.2

planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      motion_model_for_search: "REEDS_SHEPP"  # DUBIN for forward-only arcs
      allow_reverse_expansion: True
      minimum_turning_radius: 0.971            # meters (0.413 / tan(0.4))
      tolerance: 0.25
      downsample_costmap: False
      max_planning_time: 2.0
